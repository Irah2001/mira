name: Go Mira CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.22"

            - name: Check Formatting
              run: |
                  # Échoue si go fmt trouve des fichiers à formater
                  if [ -n "$(go fmt ./...)" ]; then
                    echo "::error::Code non formaté ! Exécute 'go fmt ./...' en local."
                    exit 1
                  fi

            - name: Vet
              run: go vet ./...

            - name: Run Tests
              run: go test -v ./...
